# =============================================================================
# BLOOM LIMS Conda Environment Definition
# =============================================================================
# Environment Name: BLOOM-local (deployment-specific names are supplied at activation time)
#
# Setup:
#   conda env create -n BLOOM-local -f environment.yaml
#   conda activate BLOOM-local
#
# Update existing environment:
#   conda env update -f environment.yaml --prune
#
# NOTE: This project uses CONDA for environment management, NOT pip/poetry/venv.
#       See pyproject.toml [tool.bloom] section for more configuration details.
# =============================================================================

name: BLOOM-local

channels:
  - conda-forge
dependencies:
  - ipython=8.18.1
  - parallel=20230922
  - pip=23.3.1
  - postgresql=16.1
  - psycopg2=2.9.9
  - python=3.12.0
  - djlint
  - jq
  - fd-find
  - rclone
  - setuptools<81
  - pip:
      - black>=24.0.0
      - cli-core-yo==0.5.2
      - boto3>=1.34.0
      - daylily-cognito==0.4.2
      - daylily-tapdb==3.2.3
      - moto>=5.0.0
      - fastapi>=0.110.0
      - httpx>=0.27.2
      - itsdangerous>=2.1.2
      - Jinja2>=3.0.3
      - matplotlib>=3.8.0
      - mypy>=1.0
      - pandas>=2.2.0
      - playwright>=1.42.0
      - pydantic>=2.6.0
      - pydantic-settings>=2.0.0
      - PyJWT>=2.8.0
      - python-multipart>=0.0.9
      - pytest>=8.0
      - pytest-asyncio>=0.23.0
      - pytest-cov>=4.1.0
      - pytest-playwright>=0.4.4
      - psutil>=5.9.0
      - PyYAML>=6.0
      - requests>=2.28.2
      - requests-mock>=1.11.0
      - rich>=13.0
      - ruff>=0.1.0
      - sqlalchemy>=2.0.23
      - starlette>=0.35.1
      - uvicorn>=0.28.0
      - zebra-day==5.0.6
      - daylily-carrier-tracking==0.5.1
