# =============================================================================
# BLOOM LIMS Conda Environment Definition
# =============================================================================
# Environment Name: BLOOM-local (deployment-specific names are preferred)
#
# Setup:
#   conda env create -n BLOOM-local -f bloom_env.yaml
#   conda activate BLOOM-local
#
# Update existing environment:
#   conda env update -f bloom_env.yaml --prune
#
# NOTE: This project uses CONDA for environment management, NOT pip/poetry/venv.
#       See pyproject.toml [tool.bloom] section for more configuration details.
# =============================================================================

name: BLOOM-local

channels:
  - conda-forge
dependencies:
  - ipython=8.18.1
  - parallel=20230922
  - pip=23.3.1
  - postgresql=16.1
  - psycopg2=2.9.9
  - python=3.12.0
  - djlint
  - jq
  - fd-find
  - rclone
  - setuptools<81
  - pip:
    - -e .[dev]
