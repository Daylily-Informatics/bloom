# =============================================================================
# BLOOM LIMS Conda Environment Definition
# =============================================================================
# Environment Name: BLOOM-local (deployment-specific names are preferred)
#
# Setup:
#   conda env create -n BLOOM-local -f bloom_env.yaml
#   conda activate BLOOM-local
#
# Update existing environment:
#   conda env update -f bloom_env.yaml --prune
#
# NOTE: This project uses CONDA for environment management, NOT pip/poetry/venv.
#       See pyproject.toml [tool.bloom] section for more configuration details.
# =============================================================================

name: BLOOM-local

channels:
  - conda-forge
dependencies:
  - ipython=8.18.1
  - parallel=20230922
  - pip=23.3.1
  - postgresql=16.1
  - psycopg2=2.9.9
  - cryptography=41.0.7
  - python=3.12.0
  - pytz=2023.3.post1
  - simplejson=3.19.2
  - sqlalchemy=2.0.23
  - networkx=3.2.1
  - matplotlib=3.8.2
  - jinja2=3.0.3
  - djlint
  - pytz
  - jq
  - fd-find
  - rclone
  - gunicorn
  - psutil>=5.9.0
  - pip:
    - cli-core-yo>=0.5.0
    - daylily-tapdb==3.2.0
    # Optional local editable override for development:
    # - -e ../../daylily/daylily-tapdb
    - daylily-cognito==0.3.0
    # Optional local override for development:
    # - -e ../daylily-cognito
    - zebra_day==3.2.0
    - daylily-carrier-tracking==0.5.1
    - black
    - uvicorn==0.28.0
    - fastapi==0.110.0
    - httpx==0.27.2
    - itsdangerous>=2.2.0
    - pyjwt==2.8.0
    - python-multipart==0.0.9
    - nest_asyncio==1.6.0
    - boto3
    - botocore
    - requests_mock
    - moto
    - pandas
    - matplotlib
    - pydantic-settings>=2.0.0
    - pyyaml>=6.0
    - click>=8.0
    - rich>=13.0
    - pytest>=8.0
    - pytest-cov>=4.1.0
    - pytest-asyncio>=0.23.0
    - playwright>=1.42.0
    - pytest-playwright>=0.4.4
