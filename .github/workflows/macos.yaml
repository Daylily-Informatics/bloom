name: BLOOM MacOS

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'
  pull_request:
    branches:
      - '**'

jobs:
  macos-job:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: bloom

      - name: Check out daylily-tapdb (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Daylily-Informatics/daylily-tapdb
          path: daylily-tapdb

      - name: Check out daylily-cognito (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Daylily-Informatics/daylily-cognito
          path: daylily-cognito

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12.0

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
          python-version: 3.12.0
          activate-environment: BLOOM
          environment-file: bloom/bloom_env.yaml
          auto-activate-base: false

      - name: Run custom PostgreSQL setup script (if applicable)
        shell: bash -l {0}
        working-directory: bloom
        run: |
          source bloom_activate.sh
          bloom db init
          pytest

