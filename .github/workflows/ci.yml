name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Collect changed Python files
        id: changed
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          def collect_files(command):
              result = subprocess.run(command, capture_output=True, check=False, text=True)
              if result.returncode == 0:
                  return [line.strip() for line in result.stdout.splitlines() if line.strip()]
              return None

          event = os.environ["GITHUB_EVENT_NAME"]
          if event == "pull_request":
              with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as fh:
                  payload = json.load(fh)
              base_sha = payload["pull_request"]["base"]["sha"]
              head_sha = payload["pull_request"]["head"]["sha"]
              files = collect_files(
                  ["git", "diff", "--diff-filter=ACMRT", "--name-only", f"{base_sha}...{head_sha}", "--", "*.py"]
              )
              if files is None:
                  files = collect_files(
                      ["git", "diff", "--diff-filter=ACMRT", "--name-only", f"{base_sha}..{head_sha}", "--", "*.py"]
                  )
              if files is None:
                  files = []
          else:
              has_parent = subprocess.run(
                  ["git", "rev-parse", "--verify", "HEAD^"],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0
              if has_parent:
                  files = (
                      collect_files(["git", "diff", "--diff-filter=ACMRT", "--name-only", "HEAD^", "HEAD", "--", "*.py"])
                      or []
                  )
              else:
                  files = collect_files(["git", "ls-files", "*.py"]) or []
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"files={json.dumps(files)}\n")
              fh.write(f"count={len(files)}\n")
          PY

      - name: Run ruff check
        if: steps.changed.outputs.count != '0'
        run: ruff check ${{ join(fromJson(steps.changed.outputs.files), ' ') }}

      - name: Run ruff format check
        if: steps.changed.outputs.count != '0'
        run: ruff format --check ${{ join(fromJson(steps.changed.outputs.files), ' ') }}

      - name: Skip ruff when no Python files changed
        if: steps.changed.outputs.count == '0'
        run: echo "No Python file changes detected."

  security:
    name: Security Scanning (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Collect changed Python files
        id: changed
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          def collect_files(command):
              result = subprocess.run(command, capture_output=True, check=False, text=True)
              if result.returncode == 0:
                  return [line.strip() for line in result.stdout.splitlines() if line.strip()]
              return None

          event = os.environ["GITHUB_EVENT_NAME"]
          if event == "pull_request":
              with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as fh:
                  payload = json.load(fh)
              base_sha = payload["pull_request"]["base"]["sha"]
              head_sha = payload["pull_request"]["head"]["sha"]
              files = collect_files(
                  ["git", "diff", "--diff-filter=ACMRT", "--name-only", f"{base_sha}...{head_sha}", "--", "*.py"]
              )
              if files is None:
                  files = collect_files(
                      ["git", "diff", "--diff-filter=ACMRT", "--name-only", f"{base_sha}..{head_sha}", "--", "*.py"]
                  )
              if files is None:
                  files = []
          else:
              has_parent = subprocess.run(
                  ["git", "rev-parse", "--verify", "HEAD^"],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0
              if has_parent:
                  files = (
                      collect_files(["git", "diff", "--diff-filter=ACMRT", "--name-only", "HEAD^", "HEAD", "--", "*.py"])
                      or []
                  )
              else:
                  files = collect_files(["git", "ls-files", "*.py"]) or []
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"files={json.dumps(files)}\n")
              fh.write(f"count={len(files)}\n")
          PY

      - name: Run bandit security scan
        if: steps.changed.outputs.count != '0'
        run: bandit -c pyproject.toml ${{ join(fromJson(steps.changed.outputs.files), ' ') }}

      - name: Skip bandit when no Python files changed
        if: steps.changed.outputs.count == '0'
        run: echo "No Python file changes detected."

  test:
    name: Beta Tests
    runs-on: ubuntu-latest
    env:
      MERIDIAN_ENVIRONMENT: production
      MERIDIAN_SANDBOX_PREFIX: ""
      MERIDIAN_DOMAIN_CODE: Z
      TAPDB_APP_CODE: Z
      USER: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Prepare explicit Bloom/TapDB runtime config
        shell: bash -el {0}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          repo_root = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          runtime_root = Path(os.environ["RUNNER_TEMP"]).resolve() / "bloom-ci"
          runtime_root.mkdir(parents=True, exist_ok=True)

          tapdb_config_path = runtime_root / "tapdb" / "bloom" / "bloom-mmm" / "tapdb-config.yaml"
          tapdb_config_path.parent.mkdir(parents=True, exist_ok=True)
          bloom_config_path = runtime_root / "bloom" / "bloom-config-bloom-ci.yaml"
          bloom_config_path.parent.mkdir(parents=True, exist_ok=True)
          upload_dir = runtime_root / "uploads"
          upload_dir.mkdir(parents=True, exist_ok=True)

          domain_registry_path = (
              repo_root / "bloom_lims" / "etc" / "domain_code_registry.json"
          ).resolve()
          prefix_registry_path = (
              repo_root / "bloom_lims" / "etc" / "prefix_ownership_registry.json"
          ).resolve()

          tapdb_config_path.write_text(
              "\n".join(
                  [
                      "meta:",
                      "  config_version: 4",
                      "  client_id: bloom",
                      "  database_name: bloom",
                      "  owner_repo_name: bloom",
                      f"  domain_registry_path: {domain_registry_path}",
                      f"  prefix_ownership_registry_path: {prefix_registry_path}",
                      "target:",
                      "  engine_type: local",
                      "  host: localhost",
                      '  port: "5566"',
                      '  ui_port: "8912"',
                      '  user: "postgres"',
                      "  password: null",
                      '  database: "tapdb_bloom_dev"',
                      '  schema_name: "tapdb_bloom_tests_dev"',
                      '  domain_code: "Z"',
                      '  cognito_user_pool_id: "us-west-2_test-pool"',
                      '  audit_log_euid_prefix: "BGX"',
                      '  support_email: "support@dyly.bio"',
                      "safety:",
                      "  safety_tier: local",
                      "  destructive_operations: confirm_required",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          os.chmod(tapdb_config_path, 0o600)

          bloom_config_path.write_text(
              "\n".join(
                  [
                      "aws:",
                      "  profile: lsmc",
                      "  region: us-west-2",
                      "environment: testing",
                      "tapdb:",
                      "  client_id: bloom",
                      "  database_name: bloom",
                      "  schema_name: tapdb_bloom_tests_dev",
                      "  physical_database: tapdb_bloom_dev",
                      "  owner_repo_name: bloom",
                      "  domain_code: Z",
                      f"  domain_registry_path: {domain_registry_path}",
                      f"  prefix_ownership_registry_path: {prefix_registry_path}",
                      "  strict_namespace: true",
                      f"  config_path: {tapdb_config_path}",
                      "  local_pg_port: 5566",
                      "storage:",
                      f"  upload_dir: {upload_dir}",
                      "auth:",
                      "  mode: cognito",
                      "  jwt_secret: bloom-ci-session-secret",
                      "  cognito_user_pool_id: us-west-2_test-pool",
                      "  cognito_client_id: bloom-ci-client",
                      "  cognito_region: us-west-2",
                      "  cognito_domain: bloom-ci.auth.us-west-2.amazoncognito.com",
                      "  cognito_redirect_uri: https://localhost:8912/auth/callback",
                      "  cognito_logout_redirect_uri: https://localhost:8912/",
                      "deployment:",
                      "  name: bloom-ci",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          os.chmod(bloom_config_path, 0o600)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write("BLOOM_DEPLOYMENT_CODE=bloom-ci\n")
              fh.write("DEPLOYMENT_CODE=bloom-ci\n")
              fh.write("LSMC_DEPLOYMENT_CODE=bloom-ci\n")
              fh.write(f"BLOOM_CONFIG_PATH={bloom_config_path}\n")
              fh.write("BLOOM_TAPDB__CLIENT_ID=bloom\n")
              fh.write("BLOOM_TAPDB__DATABASE_NAME=bloom\n")
              fh.write("BLOOM_TAPDB__SCHEMA_NAME=tapdb_bloom_tests_dev\n")
              fh.write("BLOOM_TAPDB__OWNER_REPO_NAME=bloom\n")
              fh.write("BLOOM_TAPDB__DOMAIN_CODE=Z\n")
              fh.write("BLOOM_TAPDB__STRICT_NAMESPACE=1\n")
              fh.write("BLOOM_TAPDB__LOCAL_PG_PORT=5566\n")
              fh.write(f"BLOOM_TAPDB__CONFIG_PATH={tapdb_config_path}\n")
              fh.write(f"BLOOM_TAPDB__DOMAIN_REGISTRY_PATH={domain_registry_path}\n")
              fh.write(
                  f"BLOOM_TAPDB__PREFIX_OWNERSHIP_REGISTRY_PATH={prefix_registry_path}\n"
              )
              fh.write("TAPDB_OWNER_REPO=bloom\n")
              fh.write("TAPDB_DOMAIN_CODE=Z\n")
              fh.write(f"TAPDB_DOMAIN_REGISTRY_PATH={domain_registry_path}\n")
              fh.write(
                  f"TAPDB_PREFIX_OWNERSHIP_REGISTRY_PATH={prefix_registry_path}\n"
              )
          PY

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: BLOOM-local
          environment-file: environment.yaml
          auto-activate-base: false

      - name: Install bloom in editable mode
        shell: bash -el {0}
        run: |
          pip install -e '.[dev]'

      - name: Initialize local Bloom database
        shell: bash -el {0}
        run: |
          bloom db build --skip-conda-env-check

      - name: Run beta-critical tests
        shell: bash -el {0}
        run: |
          pytest --no-cov \
            tests/test_config_runtime.py \
            tests/test_route_coverage_gaps_api.py \
            tests/test_route_coverage_gaps_gui.py \
            tests/test_api_v1.py \
            tests/test_gui_endpoints.py \
            tests/test_api_atlas_bridge.py \
            tests/test_atlas_lookup_resilience.py \
            tests/test_queue_flow.py \
            tests/test_run_resolver.py
